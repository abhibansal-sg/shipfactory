<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factory tab conformance harness</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--color-card);
        color: var(--color-foreground);
      }
      .harness-shell {
        min-height: 100vh;
        background: color-mix(in srgb, var(--color-card) 78%, transparent);
      }
      .harness-context {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.55rem 1.25rem;
        border-bottom: 1px solid var(--color-border);
        background: var(--color-card);
        color: var(--color-muted-foreground);
        font-size: 0.72rem;
      }
      .harness-context strong {
        color: var(--color-foreground);
      }
      .factory-root {
        min-height: calc(100vh - 2.5rem);
      }
    </style>
  </head>
  <body>
    <div class="harness-shell">
      <div class="harness-context">
        <strong>Hermes dashboard · Factory plugin conformance</strong>
        <span>Real bundle · real host theme tokens · mocked read data</span>
      </div>
      <div class="factory-root"></div>
    </div>
    <script type="module" src="./conformance-harness.js"></script>
  </body>
</html>
